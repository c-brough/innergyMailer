<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Innergy PO → Mail — Options</title>
    <style>
      body {
        font: 14px -apple-system, system-ui, sans-serif;
        color: #1a1a1a;
        max-width: 460px;
        margin: 32px auto;
        padding: 0 20px;
      }
      h1 { font-size: 18px; margin-bottom: 4px; }
      p.sub { color: #666; margin-top: 0; }
      fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; }
      legend { font-weight: 600; padding: 0 6px; }
      label.opt { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; }
      label.opt input { width: 16px; height: 16px; }
      #status { margin-top: 14px; height: 18px; color: #2e7d32; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Innergy PO → Mail</h1>
    <p class="sub">Choose which app should open the drafted email.</p>

    <fieldset>
      <legend>Mail app</legend>
      <label class="opt">
        <input type="radio" name="mailApp" value="mail" />
        Apple Mail
      </label>
      <label class="opt">
        <input type="radio" name="mailApp" value="outlook" />
        Microsoft Outlook
      </label>
    </fieldset>

    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
